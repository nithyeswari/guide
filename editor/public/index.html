<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide — Living Document Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/editor.css">
  <link rel="stylesheet" href="/css/chat.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="editor-shell">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">GUIDE <span>// editor</span></div>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">&#9776;</button>
    </div>
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="Search docs...">
    </div>
    <nav class="sidebar-tree" id="sidebar-tree">
      <!-- Populated by JS -->
    </nav>
  </aside>

  <!-- ── MAIN CONTENT ── -->
  <main class="main-content">
    <div class="toolbar">
      <div class="toolbar-breadcrumb" id="breadcrumb">
        <span>Select a document</span>
      </div>
      <div class="toolbar-actions">
        <button class="toolbar-btn" id="btn-export" style="display:none" title="Export modified document">
          <span>&#8681;</span> Export
        </button>
        <button class="toolbar-btn" id="btn-raw" style="display:none" title="View raw source">
          <span>&lt;/&gt;</span> Raw
        </button>
      </div>
    </div>

    <div class="content-area" id="content-area">
      <!-- Welcome screen or rendered document -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">&#9998;</div>
        <h2>Living Document Editor</h2>
        <p>Browse your engineering guides on the left. Select any text in a document to chat with AI and edit content inline.</p>
        <div class="hint">Select text &rarr; Chat popup &rarr; AI response &rarr; Insert or Replace</div>
      </div>
      <div class="doc-scope" id="doc-content" style="display:none"></div>
    </div>
  </main>

</div>

<!-- ── CHAT POPUP ── -->
<div class="chat-overlay" id="chat-overlay"></div>
<div class="chat-popup" id="chat-popup">
  <div class="chat-header">
    <div class="chat-header-dot"></div>
    <div class="chat-header-title">Ask Claude</div>
    <button class="chat-header-close" id="chat-close">&times;</button>
  </div>
  <div class="chat-selection">
    <div class="chat-selection-label">Selected text</div>
    <div class="chat-selection-text" id="chat-selected-text"></div>
  </div>
  <div class="chat-input-area">
    <div class="chat-input-wrapper">
      <textarea class="chat-input" id="chat-input" placeholder="Ask about this text..." rows="2"></textarea>
      <button class="chat-send-btn" id="chat-send">Send</button>
    </div>
    <div class="chat-quick-prompts">
      <button class="quick-prompt" data-prompt="Explain this in simpler terms">Simplify</button>
      <button class="quick-prompt" data-prompt="Rewrite this for better clarity">Rewrite</button>
      <button class="quick-prompt" data-prompt="Add more detail and examples">Expand</button>
      <button class="quick-prompt" data-prompt="Convert to bullet points">Bullets</button>
      <button class="quick-prompt" data-prompt="What's wrong or inaccurate here?">Review</button>
    </div>
  </div>
  <div class="chat-response" id="chat-response">
    <div class="chat-response-label">
      <span style="color:var(--green)">&#9679;</span> Claude
    </div>
    <div class="chat-response-content" id="chat-response-content"></div>
  </div>
  <div class="chat-actions" id="chat-actions">
    <button class="chat-action-btn primary" id="btn-replace">Replace Selection</button>
    <button class="chat-action-btn secondary" id="btn-insert">Insert Below</button>
    <button class="chat-action-btn tertiary" id="btn-copy">Copy</button>
  </div>
</div>

<script src="/js/api-client.js"></script>
<script src="/js/inline-edit.js"></script>
<script src="/js/selection-chat.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
